- text: "Daniel has been an incredibly reliable, thoughtful, professional, and responsive
    source of ideas and support as we've worked together to update some old software
    functionality. Very knowledgeable, he has asked lots of questions, been very patient,
    and explained technical issues in easy to understand terms for those users and team
    members who aren't technically astute. Worked quickly and turned around additional
    requests and changes quickly and thoroughly. Overall a fantastic experience and would
    recommend him without reservations."
  reviewer: Julie Brown
  title: President, Center for Strategy Research
  source: Guru
  url: https://www.guru.com/freelancers/westsmith/reviews

- text: "Dan has been absolutely fantastic to work with and I highly recommend his work.
    His breadth of knowledge and skill sets fit perfectly with our project and I can't
    imagine finding a better person to work with. He's a very quick study and our project
    onboarding time was kept to a minimum. Dan was also very flexible on our particular
    project which was extremely helpful to the Product Team. We are looking forward to
    the potential of working with Dan again in the near future."
  reviewer: Dave Ruel
  title: VP of Product, Hanzo
  source: LinkedIn
  url: https://www.linkedin.com/in/daniel-ball-consultant/details/recommendations/

- text: "The team at Westsmith gave us a really useful afternoon of consultancy on our
    SaaS app. They quickly got up to speed with what we were building, spotted some issues
    we hadn't considered and gave us clear, actionable advice we could implement straight
    away. They also introduced us to some AI-powered approaches that we hadn't thought to
    explore, which opened up some genuinely interesting possibilities for the product.
    They've remained available for questions since, which has been a real bonus."
  reviewer: DealerMetrics
  title: ""
